name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Version comes from package.json "packageManager"
      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Pack check
        run: PACK_CHECK_SKIP_BUILD=1 pnpm pack:check
      - name: Scan fixture payload
        run: node packages/scan/dist/cli.js --payload-file test/fixtures/scan-ok.json
      - run: pnpm --filter @ntnkit/example-ci-smoke start
      - run: NTNKIT_SIMULATE_WINDOW=1 pnpm --filter @ntnkit/example-ci-smoke start
      - run: SMOKE_LIVE=1 pnpm --filter @ntnkit/example-ci-smoke start

  ntnbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ntnkit
        uses: actions/checkout@v6
        with:
          path: ntnkit

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: ntnkit/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ntnkit/pnpm-lock.yaml

      - name: Install Node dependencies
        working-directory: ntnkit
        run: pnpm install --frozen-lockfile

      - name: Build ntnkit packages
        working-directory: ntnkit
        run: pnpm build

      - name: Install netns tools
        run: |
          # Hosted runners ship flaky third-party apt sources (Chrome/Microsoft)
          # that fail apt-get update mid-mirror-sync. We only need Ubuntu packages.
          sudo grep -rlE 'dl\.google\.com|packages\.microsoft\.com' \
            /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -r rm -f || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq iproute2 iptables >/dev/null

      # Bump NTNBOX_VERSION when adopting a newer ntn-in-a-box release.
      - name: Install ntnbox from release
        env:
          NTNBOX_VERSION: v0.1.1
        run: |
          asset="ntnbox-linux-amd64"
          base="https://github.com/hyavari/ntn-in-a-box/releases/download/${NTNBOX_VERSION}"
          cd /tmp
          curl -fsSL "${base}/${asset}" -o "${asset}"
          curl -fsSL "${base}/${asset}.sha256" -o "${asset}.sha256"
          sha256sum -c "${asset}.sha256"
          chmod +x "${asset}"
          sudo cp "${asset}" /usr/local/bin/ntnbox
          ntnbox >/dev/null

      - name: Run ci-smoke under ntnbox profile
        working-directory: ntnkit
        run: |
          sudo env "PATH=$PATH" ntnbox run \
            --addr 0.0.0.0:18080 \
            --profile test/profiles/ci_gap.yaml \
            -- \
            env NTNBOX_API_BASE=http://10.200.0.1:18080 \
            ./scripts/ntnbox-ci-smoke.sh
