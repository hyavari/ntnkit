name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm pack:check

      - name: Publish packages
        run: |
          pnpm --filter @ntnkit/core publish --access public --no-git-checks
          pnpm --filter @ntnkit/sdk publish --access public --no-git-checks
          pnpm --filter @ntnkit/scan publish --access public --no-git-checks
          pnpm --filter @ntnkit/sqlite publish --access public --no-git-checks
